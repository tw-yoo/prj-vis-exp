<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Viewer</title>
    <link rel="stylesheet" id="validationStylesheet">
    <script>
        window.__VALIDATION_BASE_PATH__ = location.pathname.split('/').filter(Boolean)[0] === 'validation'
            ? '/validation'
            : '';
        document.getElementById('validationStylesheet').href = `${window.__VALIDATION_BASE_PATH__}/viewer.css`;
    </script>
</head>
<body>
<div class="viewer-wrap">
    <div class="viewer-header">
        <span class="chart-counter" id="chartCounter"></span>
        <span class="chart-id" id="chartId"></span>
    </div>
    <div class="chart-row">
        <button class="nav-btn" id="prevBtn" disabled>&#8592;</button>
        <div id="chartContainer"></div>
        <button class="nav-btn" id="nextBtn">&#8594;</button>
    </div>
    <div class="bottom-area">
        <div id="questionText"></div>
        <div id="explanationArea"></div>
        <div id="completionArea"></div>
        <div id="commentArea"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
    const validationScript = document.createElement('script');
    validationScript.type = 'module';
    validationScript.src = `${window.__VALIDATION_BASE_PATH__}/viewer.js`;
    document.body.appendChild(validationScript);
</script>
</body>
</html>
