<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Viewer</title>
    <link rel="stylesheet" id="validationStylesheet">
    <script>
        const validationPathParts = location.pathname.split('/').filter(Boolean);
        const validationPathIndex = validationPathParts.indexOf('validation');
        window.__VALIDATION_BASE_PATH__ = validationPathIndex >= 0
            ? `/${validationPathParts.slice(0, validationPathIndex + 1).join('/')}`
            : '';
        document.getElementById('validationStylesheet').href = `${window.__VALIDATION_BASE_PATH__}/viewer.css`;
    </script>
</head>
<body>
<div class="viewer-wrap">
    <div class="viewer-header">
        <span class="chart-counter" id="chartCounter"></span>
        <span class="chart-id" id="chartId"></span>
    </div>
    <div class="chart-row">
        <div id="chartContainer"></div>
    </div>
    <div class="bottom-area">
        <div id="questionText"></div>
        <div id="explanationArea"></div>
        <div id="commentArea"></div>
        <div id="completionArea"></div>
        <div class="page-nav">
            <button class="page-nav__btn" id="prevBtn" disabled>&larr; Previous</button>
            <button class="page-nav__btn page-nav__btn--primary" id="nextBtn">Next &rarr;</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
    const validationScript = document.createElement('script');
    validationScript.type = 'module';
    validationScript.src = `${window.__VALIDATION_BASE_PATH__}/viewer.js`;
    document.body.appendChild(validationScript);
</script>
</body>
</html>
