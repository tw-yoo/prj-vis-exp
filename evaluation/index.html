<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluation</title>
  <link rel="stylesheet" id="evaluationStylesheet">
  <script>
    // Derive the evaluation base from the URL so the app works whether it is served
    // at the domain root (/evaluation/...) or under a project-pages prefix
    // (/prj-vis-exp/evaluation/...). Take everything up to and including the
    // "evaluation" path segment; withBase() then appends '/config.json' etc.
    (function () {
      var segs = location.pathname.split('/').filter(Boolean);
      var i = segs.indexOf('evaluation');
      window.__EVALUATION_BASE_PATH__ = i >= 0 ? '/' + segs.slice(0, i + 1).join('/') : '';
    })();
    document.getElementById('evaluationStylesheet').href = `${window.__EVALUATION_BASE_PATH__}/viewer.css`;
  </script>
</head>
<body>
  <main class="viewer-wrap">
    <!-- IDs kept for JS compat; hidden via CSS -->
    <span id="chartCounter" hidden></span>
    <span id="chartId" hidden></span>

    <section class="intro-card" id="introCard" aria-label="Introduction" hidden>
      <div class="intro-eyebrow" id="introEyebrow"></div>
      <h1 class="intro-title" id="introTitle"></h1>
      <div class="intro-body" id="introBody"></div>

      <div class="intro-demo" id="introDemo" hidden>
        <div class="intro-demo__chart" id="introDemoChart"></div>
        <div class="intro-demo__question" id="introDemoQuestion"></div>
        <div class="intro-demo__explanation" id="introDemoExplanation"></div>
        <p class="intro-demo__hint" id="introDemoHint"></p>
        <div class="intro-demo__survey" id="introDemoSurvey" hidden></div>
      </div>
    </section>

    <div class="task-banner" id="taskBanner" hidden>
      <strong>Task:</strong> Review the chart and the visual explanation, then verify the answer and rate the explanation.
    </div>

    <section class="chart-card" id="chartCard" aria-label="Chart">
      <div class="chart-header">
        <span class="method-badge" id="methodBadge"></span>
      </div>
      <div id="chartContainer"></div>
    </section>

    <div id="postSessionHeading" class="question-text post-session-heading" hidden></div>

    <section class="review-panel" id="reviewPanel" aria-label="System explanations" hidden>
      <button class="review-arrow review-arrow--prev" id="reviewPrev" type="button" aria-label="Previous explanation">&#8249;</button>
      <div class="review-stage">
        <p class="review-title">Below are 5 explanations from system. Use the <b><u>arrows</u></b> (&#8249; &#8250;) to review them.</p>
        <div class="review-counter" id="reviewCounter"></div>
        <div id="reviewChart" class="review-chart"></div>
        <div id="reviewQuestion" class="question-text"></div>
        <div id="reviewExplanation" class="explanation-area"></div>
      </div>
      <button class="review-arrow review-arrow--next" id="reviewNext" type="button" aria-label="Next explanation">&#8250;</button>
    </section>

    <section class="bottom-area" id="bottomArea" aria-label="Question and survey">
      <div id="debugMeta" class="debug-meta"></div>
      <div id="questionText" class="question-text"></div>
      <div id="descriptionText" class="description-text"></div>
      <div id="explanationArea" class="explanation-area"></div>
      <form id="surveyArea" class="survey-area"></form>
    </section>

    <div class="survey-warning" id="surveyWarning" role="alert" aria-live="polite"></div>

    <nav class="navigation-footer" aria-label="Page navigation">
      <button class="nav-btn nav-btn--prev" id="prevBtn" type="button" disabled>
        <span class="nav-btn__icon" aria-hidden="true">&#8592;</span>
        <span class="nav-btn__label">Previous</span>
      </button>

      <div class="progress-center">
        <div class="progress-track" role="progressbar" id="progressTrack" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel"></span>
      </div>

      <button class="nav-btn nav-btn--next" id="nextBtn" type="button">
        <span class="nav-btn__label">Next</span>
        <span class="nav-btn__icon" aria-hidden="true">&#8594;</span>
      </button>
    </nav>
  </main>

  <script type="module" src="__EVALUATION_VIEWER_SCRIPT__"></script>
</body>
</html>
