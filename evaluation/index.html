<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluation Viewer</title>
  <link rel="stylesheet" id="evaluationStylesheet">
  <script>
    window.__EVALUATION_BASE_PATH__ = location.pathname.split('/').filter(Boolean)[0] === 'evaluation'
      ? '/evaluation'
      : '';
    document.getElementById('evaluationStylesheet').href = `${window.__EVALUATION_BASE_PATH__}/viewer.css`;
  </script>
</head>
<body>
  <div class="viewer-wrap">
    <div class="viewer-header">
      <span class="chart-counter" id="chartCounter"></span>
      <span class="chart-id" id="chartId"></span>
    </div>
    <div class="chart-row">
      <button class="nav-btn" id="prevBtn" type="button" disabled>&#8592;</button>
      <div id="chartContainer"></div>
      <button class="nav-btn" id="nextBtn" type="button">&#8594;</button>
    </div>
    <div class="bottom-area">
      <div id="questionText"></div>
      <div id="descriptionText"></div>
      <div id="explanationArea"></div>
      <div id="statusArea"></div>
      <form id="surveyArea" class="survey-area"></form>
    </div>
  </div>

  <script type="module" src="__EVALUATION_VIEWER_SCRIPT__"></script>
</body>
</html>
